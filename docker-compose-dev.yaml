services:
  marva-quartz:
    image: node:23
    working_dir: /app
    ports:
      - "4444:4444"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      VITE_KEYCLOAK_AUTH_PATH: "http://localhost:8081/keycloak/"
      VITE_BLUECORE_API_PATH: "http://localhost:3000/"
    command: sh -lc "npm install && npm run dev-external -- --host"
    depends_on:
      - keycloak-middleware

  keycloak-middleware:
    image: node:23-alpine
    working_dir: /app
    extra_hosts:
      - "keycloak:host-gateway"
    ports:
      - "9401:9401"
    volumes:
      - .:/app
    environment:
      PORT: "9401"
      BASE_PATH: "/marva/util"
      VITE_KEYCLOAK_AUTH_PATH: "${VITE_KEYCLOAK_AUTH_PATH_MIDDLEWARE:-http://localhost:8081/keycloak/}"
      VITE_KEYCLOAK_INTERNAL_AUTH_PATH : "${KEYCLOAK_INTERNAL_URL:-http://keycloak:8081/keycloak/}"
      VITE_BLUECORE_API_PATH: "${VITE_BLUECORE_API_PATH_MIDDLEWARE:-}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM:-bluecore}"
      KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID:-bluecore_api}"
      KEYCLOAK_CLIENT_SECRET: "${KEYCLOAK_CLIENT_SECRET:-}"
      KEYCLOAK_REDIRECT_URI: "${KEYCLOAK_REDIRECT_URI:-http://localhost:9401/marva/util/auth/callback}"
      MARVA_REDIRECT_BASE: "${MARVA_REDIRECT_BASE:-http://localhost:4444/marva/}"
      MARVA_LOGOUT_REDIRECT: "${MARVA_LOGOUT_REDIRECT:-http://localhost:4444/marva/}"
      UPSTREAM_UTIL_BASE: "${UPSTREAM_UTIL_BASE:-}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:4444}"
      FEATURE_FLAGS: "${FEATURE_FLAGS:-}"
      MIDDLEWARE_LOG_FILE: "${MIDDLEWARE_LOG_FILE:-/app/logs/keycloak-middleware.log}"
    command: sh -lc "node --watch middleware/keycloak-middleware.js"
